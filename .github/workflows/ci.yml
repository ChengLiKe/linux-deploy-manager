name: CI 构建检查

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  go-check:
    name: Go 编译检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Go 版本
        run: go version && go env

      - name: Go 编译
        run: CGO_ENABLED=0 go build ./cmd/server

      - name: Go 测试
        run: go test ./...

  frontend-check:
    name: 前端构建检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22.14'

      - name: Node 版本
        run: node --version && npm --version

      - name: npm install
        run: npm install
        working-directory: web

      - name: npm build
        run: npm run build
        working-directory: web
