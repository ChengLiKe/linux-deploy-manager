name: CI 构建检查

on:
  push:
    branches: [main, master, develop]

jobs:
  check:
    name: 构建检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Go 编译
        run: CGO_ENABLED=0 go build ./cmd/server

      - name: Go 测试
        run: go test ./...

      - name: 前端构建
        run: |
          cd web
          npm install --ignore-scripts
          npm run build
