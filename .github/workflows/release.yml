name: 构建与发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 前端先构建，因为 Go 的 go:embed 依赖它
  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22.14'

      - name: npm install
        run: npm install --ignore-scripts
        working-directory: web

      - name: npm build
        run: npm run build
        working-directory: web

      - uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: web/dist/

  build-go:
    name: 编译 Go 二进制
    needs: [build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v5

      # 下载前端产物到 go:embed 目录
      - uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: cmd/server/web/dist/

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: 提取版本号
        id: version
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "VERSION=${V}" >> "$GITHUB_OUTPUT"

      - name: 编译 Windows amd64
        run: |
          mkdir -p bin/win32
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o bin/win32/linux-deploy-manager.exe ./cmd/server

      - uses: actions/upload-artifact@v6
        with:
          name: go-binaries
          path: bin/

  package:
    name: 打包 ${{ matrix.label }}
    needs: [build-go, build-frontend]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            platform: win
            binary-dir: win32
            binary: linux-deploy-manager.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22.14'

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: 下载 Go 二进制
        uses: actions/download-artifact@v7
        with:
          name: go-binaries
          path: bin/

      - name: 下载前端产物
        uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: cmd/server/web/dist/

      - name: npm install
        run: npm install --ignore-scripts

      - name: 打包发布
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/electron-build.js --${{ matrix.platform }} --publish
