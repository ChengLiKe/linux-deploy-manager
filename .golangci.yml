run:
  timeout: 10m
  tests: true
  allow-parallel-runners: true
  allow-serial-runners: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - prealloc
    - unconvert
    - whitespace

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/linux-deploy-manager

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - govet
